<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registrar Paciente</title>
    <link rel="stylesheet" th:href="@{/styleformulario.css}">
</head>

<body>

    <h1>Registrar Paciente</h1>

    <form th:action="@{/pacientes/guardar}" th:object="${paciente}" method="post">

        <label>Nombre</label><br>
        <input type="text" th:field="*{nombre}" required><br><br>

        <label>Especie</label><br>
        <input type="text" th:field="*{especie}" required><br><br>

        <label>Raza</label><br>
        <input type="text" th:field="*{raza}" required><br><br>

        <label>Edad</label><br>
        <input type="number" th:field="*{edad}" required><br><br>

        <label>Dueño</label><br>
        <input type="text" th:field="*{dueno}" required><br><br>

        <button type="submit">Guardar Paciente</button>

    </form>

    <br>

    <a th:href="@{/pacientes/lista}">Ver pacientes registrados</a>
    <br><br>

    <a th:href="@{/home}">
        <button type="button">Volver al Home</button>
    </a>

</body>

</html>
