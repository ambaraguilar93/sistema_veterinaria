<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Lista de Pacientes</title>
    <link rel="stylesheet" th:href="@{/styleformulario.css}">
</head>

<body>

    <h1>Pacientes Registrados</h1>

    <table border="1" align="center">

        <tr>
            <th>Nombre</th>
            <th>Especie</th>
            <th>Raza</th>
            <th>Edad</th>
            <th>Dueño</th>
        </tr>

        <tr th:each="p : ${pacientes}">
            <td th:text="${p.nombre}"></td>
            <td th:text="${p.especie}"></td>
            <td th:text="${p.raza}"></td>
            <td th:text="${p.edad}"></td>
            <td th:text="${p.dueno}"></td>
        </tr>

    </table>

    <br>
    <a th:href="@{/pacientes/nuevo}">
        <button type="button">Registrar nuevo paciente</button>
    </a>

    <br><br>

    <a th:href="@{/home}">
        <button type="button">Volver al Home</button>
    </a>

</body>

</html>
